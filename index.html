<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>gritika</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #1e1e2e;
    font-family: 'Consolas', 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .terminal {
    background: #0d1117;
    border-radius: 10px;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .titlebar {
    background: #161b22;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .red { background: #ff5f56; }
  .yellow { background: #ffbd2e; }
  .green { background: #27c93f; }
  .titlebar span {
    color: #8b949e;
    margin-left: 10px;
    font-size: 13px;
  }
  .screen {
    padding: 20px;
    min-height: 260px;
    color: #c9d1d9;
    font-size: 15px;
    line-height: 1.8;
  }
  .header {
    color: #58a6ff;
    font-weight: bold;
    margin-bottom: 14px;
  }
  .prompt {
    color: #c9d1d9;
  }
  #msgInput {
    background: transparent;
    border: none;
    outline: none;
    color: #7ee787;
    font-family: inherit;
    font-size: 15px;
    width: 60%;
  }
  .line { margin: 4px 0; opacity: 0; animation: fadeIn 0.4s forwards; }
  @keyframes fadeIn { to { opacity: 1; } }
  .seen { color: #d2a8ff; }
  .blocked { color: #ff7b72; font-weight: bold; }
  .success {
    margin-top: 16px;
    color: #3fb950;
    font-size: 13px;
  }
  button {
    background: #238636;
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    font-family: inherit;
    cursor: pointer;
    margin-top: 10px;
  }
 #retryBtn {
  display: block;
  margin: 10px auto 0;
 }
  button:hover { background: #2ea043; }
  button:disabled { background: #30363d; cursor: not-allowed; }
</style>
</head>
<body>

<div class="terminal">
  <div class="titlebar">
    <div class="dot red"></div>
    <div class="dot yellow"></div>
    <div class="dot green"></div>
    <span>Output</span>
  </div>
  <div class="screen" id="screen">
    <div class="header">Text Gritika:</div>
    <div class="prompt">Enter your message: <input type="text" id="msgInput" placeholder="type here..." /></div>
    <button id="sendBtn">Send</button>
    <div id="log"></div>
   <button id="retryBtn" style="display:none;">Retry</button>
  </div>
</div>

<script>
 const input = document.getElementById('msgInput');
const btn = document.getElementById('sendBtn');
const log = document.getElementById('log');
const retryBtn = document.getElementById('retryBtn');

function addLine(text, cls, delay) {
  setTimeout(() => {
    const div = document.createElement('div');
    div.className = 'line ' + (cls || '');
    div.textContent = text;
    log.appendChild(div);
  }, delay);
}

btn.addEventListener('click', () => {
  const msg = input.value.trim();
  if (!msg || btn.disabled) return;

  btn.disabled = true;
  input.disabled = true;
  log.innerHTML = '';

  addLine('Message Seen', 'seen', 600);
  addLine('Savita blocked you', 'blocked', 1400);
  addLine('', '', 1800);
  addLine('=== Better luck next time ===', 'success', 2000);

  setTimeout(() => {
    retryBtn.style.display = 'block';
  }, 2200);
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') btn.click();
});

retryBtn.addEventListener('click', () => {
  log.innerHTML = '';
  input.value = '';
  input.disabled = false;
  btn.disabled = false;
  retryBtn.style.display = 'none';
  input.focus();
});
</script>

</body>
</html>
